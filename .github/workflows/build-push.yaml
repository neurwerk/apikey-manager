# Build and push the apikey-manager Docker image to GHCR.
#
# Triggers:
#   - Push to main   → tags :latest
#   - Push v* tag    → tags :<semver>, :latest
#
# Builds for linux/amd64 + linux/arm64 (QEMU-assisted cross-build).

name: Build & Push

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # needed for setuptools_scm / semver detection

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/neurwerk/apikey-manager
          tags: |
            type=semver,pattern={{version}}     # v0.2.0 → 0.2.0
            type=semver,pattern={{major}}.{{minor}}  # v0.2.0 → 0.2
            type=semver,pattern={{major}}        # v0.2.0 → 0
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Derive build version
        id: version
        shell: bash
        run: |
          # On tag push: strip v prefix from ref.
          # On main push: read .version file and append dev+<short_sha>
          # (PEP 440 local version format, required by newer packaging libs).
          if [[ "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            BASE=$(cat .version | tr -d ' \n')
            SHORT_SHA="${GITHUB_SHA:0:7}"
            VERSION="${BASE}.dev0+${SHORT_SHA}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SETUPTOOLS_SCM_PRETEND_VERSION=${{ steps.version.outputs.version }}